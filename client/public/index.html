<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10B981" />
    <!-- Crawlable. Per-route titles/descriptions/canonicals are set in-app (React 19
         metadata); these are the no-JS / social-crawler fallback for the homepage. -->
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="ThinkVest turns raw equity fundamentals into a defensible, weighted ranking - mapped to your sectors and scored against your KPI templates. Think. Research. Analyse. Invest."
    />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ThinkVest" />
    <meta property="og:title" content="ThinkVest - Equity Ranking & Scoring" />
    <meta
      property="og:description"
      content="Turn raw equity fundamentals into a defensible, weighted ranking - mapped to your sectors and scored against your KPI templates."
    />
    <meta property="og:image" content="https://thinkvest.in/logo512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ThinkVest - Equity Ranking & Scoring" />
    <meta
      name="twitter:description"
      content="Turn raw equity fundamentals into a defensible, weighted ranking - mapped to your sectors and scored against your KPI templates."
    />
    <meta name="twitter:image" content="https://thinkvest.in/logo512.png" />

    <title>ThinkVest - Equity Ranking & Scoring</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ThinkVest",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "ThinkVest turns raw equity fundamentals into a defensible, weighted ranking - mapped to your sectors and scored against your KPI templates.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
